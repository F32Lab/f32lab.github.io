<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F32Lab</title>
  <script>
    // Detect browser language and redirect accordingly
    var lang = (navigator.language || navigator.userLanguage || 'it').toLowerCase();
    if (lang.startsWith('en')) {
      window.location.replace('./en/index.html');
    } else {
      window.location.replace('./it/index.html');
    }
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0;url=./it/index.html" />
  </noscript>
</head>
<body>
  <!-- Redirecting... -->
</body>
</html>
